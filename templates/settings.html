{% extends "base.html" %}

{% block title %}Réglages — {{ app_name }}{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Réglages</h1>

<form class="card card-body" method="post" action="{{ url_for('settings') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

  <div class="form-check mb-2">
    <input class="form-check-input" type="checkbox" id="n1" name="notify_on_my_topic_reply" {% if settings['notify_on_my_topic_reply'] == 1 %}checked{% endif %} />
    <label class="form-check-label" for="n1">Recevoir un email quand quelqu'un répond à mes sujets</label>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="n2" name="notify_on_followed_topic_reply" {% if settings['notify_on_followed_topic_reply'] == 1 %}checked{% endif %} />
    <label class="form-check-label" for="n2">Recevoir un email quand quelqu'un répond à un sujet que je suis</label>
  </div>

  <button class="btn btn-primary">Enregistrer</button>

  <hr />
  <div class="small text-muted">
    <div><strong>Note :</strong> l'envoi email dépend de la configuration SMTP (voir README).</div>
  </div>
</form>
{% endblock %}
