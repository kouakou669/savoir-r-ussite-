{% extends "base.html" %}

{% block title %}Créer un compte — {{ app_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h1 class="h3 mb-3">Créer un compte</h1>

    <form class="card card-body" method="post" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Nom (pseudo)</label>
        <input class="form-control" name="display_name" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" name="password" minlength="8" required />
        <div class="form-text">8 caractères minimum.</div>
      </div>

      <button class="btn btn-primary w-100">Créer mon compte</button>
      <div class="text-muted small mt-2">Déjà un compte ? <a href="{{ url_for('login') }}">Connexion</a></div>
    </form>
  </div>
</div>
{% endblock %}
