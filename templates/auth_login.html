{% extends "base.html" %}

{% block title %}Connexion — {{ app_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h1 class="h3 mb-3">Connexion</h1>

    <form class="card card-body" method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" name="password" required />
      </div>

      <button class="btn btn-primary w-100">Se connecter</button>
      <div class="text-muted small mt-2">Pas encore de compte ? <a href="{{ url_for('register') }}">Créer un compte</a></div>
    </form>
  </div>
</div>
{% endblock %}
